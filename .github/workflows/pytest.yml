name: Test Plugin

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        
    - name: Install dependencies
      run: uv sync --all-extras --dev
        
    - name: Lint with Ruff
      run: |
        uv run ruff check .
        uv run ruff format --check .
        
    - name: Run tests
      run: |
        # Ensure current dir is in PYTHONPATH so pytester can find the plugin
        export PYTHONPATH=$PYTHONPATH:.
        uv run pytest -v -p pytester tests/
